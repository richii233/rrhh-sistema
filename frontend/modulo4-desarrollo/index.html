<script type="module">
// ── SUPABASE (carga dinámica y segura) ──
let db = null;

async function cargarSupabase() {
  try {
    const mod = await import('../supabase-client.js');
    db = mod.supabase;
    if (!db) throw new Error('supabase-client.js no exporta "supabase"');
  } catch (err) {
    console.error('No se pudo cargar supabase-client.js:', err);
    db = null;
  }
}

// ── captura global de errores fatales ──
window.addEventListener('error', (e) => {
  console.error('Error fatal capturado:', e.error || e.message);
  const st = document.getElementById('db-status');
  if (st) {
    st.classList.remove('hidden');
    const txt = document.getElementById('stxt');
    const dot = document.getElementById('sdot');
    if (txt) txt.textContent = 'Error cargando el módulo — revisa la consola';
    if (dot) dot.style.background = '#EF4444';
  }
});
